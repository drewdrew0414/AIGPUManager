tools:
  nvidiaSmi: nvidia-smi
  amdSmi: amd-smi
  rocmSmi: rocm-smi
  xpuSmi: xpu-smi
  ssh: ssh
  docker: docker
  kubectl: kubectl
  mlflow: mlflow
  bentoml: bentoml
  powershell: powershell
  cmd: cmd
  bash: bash
  gpumAgentCommand: gpum

kubernetes:
  enabled: true
  context:
  namespace: default
  serviceAccount: default
  imagePullPolicy: IfNotPresent
  gpuResourceKey:

mlflow:
  enabled: true
  trackingUri:
  registryUri:
  experiment:
  profile:

bentoml:
  enabled: true
  endpoint:
  home:
  workingDirectory:

monitoring:
  scanMinIntervalSec: 5
  quarantineScoreThreshold: 40.0
  thermalWarnC: 75.0
  thermalCriticalC: 85.0

externalTools:
  ray:
    enabled: true
    command: ray
    defaultArgs:
      - status
  slurm:
    enabled: true
    command: scontrol
    defaultArgs:
      - show
      - nodes
